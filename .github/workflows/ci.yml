name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
# The C job builds on macOS (like the old Travis config): the tree uses
  # -Werror and gcc on Linux flags an implicit fallthrough in two.c that
  # clang does not. src/ is frozen until Phase 9, so the warning cannot be
  # fixed there.
  c:
    name: C build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: brew install sdl2
      - name: Build
        run: make -C src

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
